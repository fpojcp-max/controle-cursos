<div
  class="form-content"
  id="agendamentoConsultaRoot"
  data-placeholder-curso-turma="Selecione"
>
  <div id="msgAgCo" class="mb-3"></div>
  <div class="actions-row">
    <div class="is-size-6 muted">
      Tela: <span class="pill"><?= parentItem ?> >> <?= subItem ?></span>
    </div>
  </div>

  <h2 class="section-title">Filtro</h2>
  <form id="agCoFormFiltro">
    <div class="columns is-multiline">
      <div class="column is-6">
        <label class="label">Curso</label>
        <div class="select is-fullwidth">
          <select id="agCoCurso" required></select>
        </div>
      </div>
      <div class="column is-6">
        <label class="label">Turma</label>
        <div class="select is-fullwidth">
          <select id="agCoTurma" disabled required></select>
        </div>
      </div>
    </div>
    <div class="consulta-form-actions">
      <button type="button" class="btn-custom btn-secondary" id="btnAgCoLimparTudo">Limpar filtro</button>
      <button type="submit" class="btn-custom" id="btnAgCoPesquisar">Pesquisar</button>
    </div>
  </form>

  <div id="agCoResultsBlock" style="display: none;">
    <div class="resultados-header">
      <h2 class="section-title">Resultados</h2>
      <button
        type="button"
        class="btn-custom"
        id="btnAgCoExportarCsv"
        disabled
        title="Exportar todos os agendamentos desta pesquisa (mesma ordenação)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
    </div>
    <div class="table-wrap">
      <table class="table is-striped is-hoverable is-fullwidth" id="agCoTable">
        <thead id="agCoHead"></thead>
        <tbody id="agCoBody"></tbody>
      </table>
    </div>
    <div id="agCoPaginationBar" class="pagination-bar" style="display: none;">
      <span class="pagination-info muted is-size-7" id="agCoMeta"></span>
      <div class="pagination-controls">
        <button type="button" id="btnAgCoAnt">Anterior</button>
        <span class="pagination-info muted is-size-7" id="agCoPagLabel"></span>
        <button type="button" id="btnAgCoProx">Próxima</button>
      </div>
    </div>
  </div>
</div>
