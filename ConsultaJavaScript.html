<script>
  const PAGE_SIZE = 50;
  let currentSort = { key: "DataCadastro", dir: "desc" };
  let lastQuery = null;
  let currentPage = 1;
  let totalRecords = 0;
  let selectedRowElement = null;
  let selectedRowId = null;
  let selectedRowCurso = "";
  let selectedRowTurma = "";
  let idColumnIndex = -1;

  window.ConsultaInit = function() {
    wireEvents();
    loadFilterOptions();
  };

  function wireEvents() {
    document.getElementById("btnLimparFiltros").addEventListener("click", () => {
      document.getElementById("searchForm").reset();
      renderMessage("");
      clearTable();
      document.getElementById("resultsMeta").textContent = "";
      document.getElementById("paginationBar").style.display = "none";
      currentPage = 1;
      totalRecords = 0;
      document.getElementById("btnExportarCsv").disabled = true;
      esconderBotaoEditar();
    });

    document.getElementById("btnExportarCsv").addEventListener("click", exportarCsv);

    document.getElementById("searchForm").addEventListener("submit", (e) => {
      e.preventDefault();
      currentPage = 1;
      pesquisar();
    });

    document.getElementById("btnPaginaAnterior").addEventListener("click", () => {
      if (currentPage <= 1) return;
      currentPage--;
      pesquisar();
    });

    document.getElementById("btnPaginaProxima").addEventListener("click", () => {
      var totalPages = Math.max(1, Math.ceil(totalRecords / PAGE_SIZE));
      if (currentPage >= totalPages) return;
      currentPage++;
      pesquisar();
    });

    document.getElementById("btnExcluir").addEventListener("click", () => {
      if (!selectedRowId) return;
      mostrarModalConfirmarExclusao();
    });

    document.getElementById("modalBtnSim").addEventListener("click", () => {
      esconderModalConfirmarExclusao();
      if (!selectedRowId) return;
      var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: true }) : null;
      google.script.run
        .withSuccessHandler(function(resp) {
          if (endBusy) endBusy();
          if (resp && String(resp).indexOf("Erro ao") === 0) {
            renderMessage(resp, "danger");
          } else {
            renderMessage(resp || "Registro excluído.", "success");
            pesquisar();
          }
        })
        .withFailureHandler(function(err) {
          if (endBusy) endBusy();
          renderMessage("Erro ao excluir: " + err, "danger");
        })
        .excluirRegistro(selectedRowId);
    });

    document.getElementById("modalBtnNao").addEventListener("click", esconderModalConfirmarExclusao);

    document.getElementById("modalConfirmarExclusao").addEventListener("click", function(e) {
      if (e.target === this) esconderModalConfirmarExclusao();
    });

    document.getElementById("btnEditar").addEventListener("click", () => {
      if (!selectedRowId) return;
      if (typeof window.navigate === "function") {
        window.navigate("cadastro", selectedRowId);
        return;
      }
      google.script.run
        .withSuccessHandler(function(baseUrl) {
          var url = baseUrl + "&id=" + encodeURIComponent(selectedRowId);
          try { window.top.location.href = url; } catch (_) { window.location.href = url; }
        })
        .obterUrlWebApp("cadastro");
    });

    document.getElementById("btnAgendar").addEventListener("click", () => {
      if (!selectedRowId || !selectedRowCurso || !selectedRowTurma) return;
      try {
        sessionStorage.setItem(
          "agendamentoIncluirPrefill",
          JSON.stringify({
            curso: selectedRowCurso,
            turma: selectedRowTurma,
            turmaId: selectedRowId,
            lockCursoTurma: true
          })
        );
      } catch (e) { /* ignore */ }
      if (typeof window.navigate === "function") {
        window.navigate("agendamento-incluir", "");
        return;
      }
      google.script.run
        .withSuccessHandler(function(baseUrl) {
          var url = baseUrl;
          try { window.top.location.href = url; } catch (_) { window.location.href = url; }
        })
        .obterUrlWebApp("agendamento-incluir");
    });
  }

  function esconderBotaoEditar() {
    const wrap = document.getElementById("wrapBtnEditar");
    wrap.classList.remove("visivel");
    wrap.style.display = "none";
  }

  function mostrarModalConfirmarExclusao() {
    document.getElementById("modalConfirmarExclusao").classList.add("visivel");
    document.getElementById("modalConfirmarExclusao").setAttribute("aria-hidden", "false");
  }

  function esconderModalConfirmarExclusao() {
    document.getElementById("modalConfirmarExclusao").classList.remove("visivel");
    document.getElementById("modalConfirmarExclusao").setAttribute("aria-hidden", "true");
  }

  function mostrarBotaoEditar(habilitado) {
    const wrap = document.getElementById("wrapBtnEditar");
    wrap.classList.add("visivel");
    wrap.style.display = "flex";
    document.getElementById("btnEditar").disabled = !habilitado;
    document.getElementById("btnExcluir").disabled = !habilitado;
    document.getElementById("btnAgendar").disabled = !habilitado;
  }

  function indiceColunaId(columns) {
    if (!columns || !columns.length) return -1;
    const k = "id";
    for (let i = 0; i < columns.length; i++) {
      const label = (columns[i].label || columns[i].key || "").toString().trim().toLowerCase();
      if (label === "id") return i;
    }
    return columns.length - 1;
  }

  function loadFilterOptions() {
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
    google.script.run
      .withSuccessHandler((config) => {
        if (endBusy) endBusy();
        fillSelect("fCurso", config.CURSOS);
        fillSelect("fTurma", config.TURMAS);
        fillSelect("fStatus", config.STATUS);
        fillSelect("fSala", config.SALAS);
        fillSelect("fResponsavel", config.RESPONSAVEIS);
        fillSelect("fOferta", config.OFERTAS);
      })
      .withFailureHandler((err) => {
        if (endBusy) endBusy();
        renderMessage(`Erro ao carregar filtros: ${err}`, "danger");
      })
      .obterConfiguracaoFormulario();
  }

  function fillSelect(id, items) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    el.appendChild(new Option("Todos", ""));
    (items || []).forEach((item) => el.appendChild(new Option(item, item)));
  }

  function getFilters() {
    return {
      curso: document.getElementById("fCurso").value || "",
      turma: document.getElementById("fTurma").value || "",
      status: document.getElementById("fStatus").value || "",
      sala: document.getElementById("fSala").value || "",
      responsavel: document.getElementById("fResponsavel").value || "",
      oferta: document.getElementById("fOferta").value || "",
      inicioDe: document.getElementById("fInicioDe").value || "",
      inicioAte: document.getElementById("fInicioAte").value || ""
    };
  }

  function pesquisar() {
    var filtros = getFilters();
    var offset = (currentPage - 1) * PAGE_SIZE;
    lastQuery = { filtros: filtros, sort: currentSort, page: { offset: offset, limit: PAGE_SIZE } };

    setSearching(true);
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;

    google.script.run
      .withSuccessHandler(function(resp) {
        if (endBusy) endBusy();
        setSearching(false);
        if (!resp || !resp.columns) {
          renderMessage("Resposta inválida do servidor.", "danger");
          return;
        }
        renderMessage("");
        totalRecords = resp.total || 0;
        renderResults(resp);
        updatePaginationUI(resp);
      })
      .withFailureHandler(function(err) {
        if (endBusy) endBusy();
        setSearching(false);
        renderMessage("Erro na pesquisa: " + err, "danger");
      })
      .pesquisarRegistros(lastQuery.filtros, lastQuery.sort, lastQuery.page);
  }

  function updatePaginationUI(resp) {
    var total = resp.total || 0;
    var rows = resp.rows || [];
    var bar = document.getElementById("paginationBar");
    var meta = document.getElementById("resultsMeta");
    var label = document.getElementById("paginationLabel");
    var btnPrev = document.getElementById("btnPaginaAnterior");
    var btnNext = document.getElementById("btnPaginaProxima");

    document.getElementById("btnExportarCsv").disabled = total === 0;

    if (total === 0 && rows.length === 0) {
      bar.style.display = "none";
      meta.textContent = "";
      return;
    }

    bar.style.display = "flex";
    var from = (currentPage - 1) * PAGE_SIZE + 1;
    var to = (currentPage - 1) * PAGE_SIZE + rows.length;
    meta.textContent = "Registros " + from + " a " + to + " de " + total;

    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    label.textContent = "Página " + currentPage + " de " + totalPages;

    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }

  function setSearching(isSearching) {
    const btn = document.getElementById("btnPesquisar");
    btn.disabled = isSearching;
    btn.setAttribute("aria-busy", isSearching ? "true" : "false");
  }

  function renderMessage(text, type) {
    const el = document.getElementById("msg");
    if (!text) {
      el.innerHTML = "";
      return;
    }
    const cls = type === "danger" ? "is-danger"
      : type === "info" ? "is-info"
      : "is-success";
    el.innerHTML = `<div class="notification ${cls} is-light">${escapeHtml(text)}</div>`;
    if (typeof window.rolarParaVerMensagemNoTopo === "function") {
      window.rolarParaVerMensagemNoTopo(el);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeCsvCell(val) {
    var s = (val === null || val === undefined) ? "" : String(val);
    if (/[",\r\n]/.test(s)) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function exportarCsv() {
    if (!lastQuery || totalRecords === 0) return;
    var btn = document.getElementById("btnExportarCsv");
    btn.disabled = true;
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: true }) : null;
    google.script.run
      .withSuccessHandler(function(data) {
        if (endBusy) endBusy();
        btn.disabled = totalRecords === 0;
        renderMessage("");
        if (!data || !data.columns) {
          renderMessage("Nenhum dado para exportar.", "danger");
          return;
        }
        var columns = data.columns || [];
        var rows = data.rows || [];
        var BOM = "\uFEFF";
        var header = columns.map(function(c) { return escapeCsvCell(c.label || c.key); }).join(";");
        var body = rows.map(function(row) {
          return row.map(function(cell) { return escapeCsvCell(cell); }).join(";");
        }).join("\r\n");
        var csv = BOM + header + "\r\n" + body;
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        var now = new Date();
        var ds = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
        var ts = String(now.getHours()).padStart(2, "0") + "-" + String(now.getMinutes()).padStart(2, "0");
        a.download = "exportacao_" + ds + "_" + ts + ".csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      })
      .withFailureHandler(function(err) {
        if (endBusy) endBusy();
        btn.disabled = false;
        renderMessage("Erro ao exportar: " + err, "danger");
      })
      .obterRegistrosParaExportar(lastQuery.filtros, lastQuery.sort);
  }

  function clearTable() {
    document.getElementById("resultsHead").innerHTML = "";
    document.getElementById("resultsBody").innerHTML = "";
  }

  function renderResults(resp) {
    const columns = resp.columns || [];
    const rows = resp.rows || [];

    idColumnIndex = indiceColunaId(columns);
    selectedRowElement = null;
    selectedRowId = null;
    selectedRowCurso = "";
    selectedRowTurma = "";

    renderHeader(columns);
    renderBody(columns, rows);

    if (rows.length >= 1) {
      mostrarBotaoEditar(false);
    } else {
      esconderBotaoEditar();
    }
  }

  function renderHeader(columns) {
    const thead = document.getElementById("resultsHead");
    thead.innerHTML = "";
    const tr = document.createElement("tr");

    columns.forEach((col) => {
      const th = document.createElement("th");
      th.classList.add("sortable");
      th.textContent = col.label || col.key;

      const icon = document.createElement("span");
      icon.className = "sort-icon";
      icon.textContent = getSortIcon(col.key);
      th.appendChild(icon);

      th.addEventListener("click", () => toggleSort(col.key));
      tr.appendChild(th);
    });

    thead.appendChild(tr);
  }

  function getSortIcon(key) {
    if (!currentSort || currentSort.key !== key) return "⇅";
    return currentSort.dir === "asc" ? "▲" : "▼";
  }

  function toggleSort(key) {
    if (currentSort.key === key) {
      currentSort = { key, dir: currentSort.dir === "asc" ? "desc" : "asc" };
    } else {
      currentSort = { key, dir: "asc" };
    }
    currentPage = 1;
    if (lastQuery) pesquisar();
  }

  function renderBody(columns, rows) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    if (!rows.length) {
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = Math.max(1, columns.length);
      td.className = "has-text-centered muted";
      td.style.padding = "18px";
      td.textContent = "Nenhum registro encontrado.";
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    let idxCursoCol = -1;
    let idxTurmaCol = -1;
    columns.forEach((col, idx) => {
      const k = String(col.key || col.label || "").trim().toLowerCase();
      if (k === "curso") idxCursoCol = idx;
      if (k === "turma") idxTurmaCol = idx;
    });

    rows.forEach((row) => {
      const tr = document.createElement("tr");
      columns.forEach((col, idx) => {
        const td = document.createElement("td");
        const v = row[idx];
        const text = (v === null || v === undefined) ? "" : String(v);
        td.textContent = text;
        td.title = text;
        td.addEventListener("click", () => {
          if (selectedRowElement && selectedRowElement !== tr) selectedRowElement.classList.remove("row-selected");
          selectedRowElement = tr;
          tr.classList.add("row-selected");
          selectedRowId = (idColumnIndex >= 0 && row[idColumnIndex] != null) ? String(row[idColumnIndex]) : null;
          selectedRowCurso = idxCursoCol >= 0 ? String(row[idxCursoCol] || "").trim() : "";
          selectedRowTurma = idxTurmaCol >= 0 ? String(row[idxTurmaCol] || "").trim() : "";
          document.getElementById("btnEditar").disabled = !selectedRowId;
          document.getElementById("btnExcluir").disabled = !selectedRowId;
          var podeAgendar = !!(selectedRowId && selectedRowCurso && selectedRowTurma);
          document.getElementById("btnAgendar").disabled = !podeAgendar;
        });
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }
</script>
