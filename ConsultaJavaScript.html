<script>
window.ConsultaInit = function() {
  const PAGE_SIZE = 50;

  function ordenacaoPadraoConsulta() {
    return {
      keys: [
        { key: "Inicio", dir: "asc" },
        { key: "Curso", dir: "asc" },
        { key: "Turma", dir: "asc" }
      ]
    };
  }
  let currentSort = ordenacaoPadraoConsulta();
  let lastQuery = null;
  let currentPage = 1;
  let totalRecords = 0;

  function setConsultaResultadosBlockVisivel(visivel) {
    var el = document.getElementById("consultaResultadosBlock");
    if (!el) return;
    el.style.display = visivel ? "" : "none";
  }

  var MSG_CONSULTA_SEM_RESULTADO_FILTROS = "Nenhum resultado encontrado para os filtros selecionados.";

  function consultaTabelaResultadosWrap() {
    var tbl = document.getElementById("resultsTable");
    return tbl ? tbl.closest(".table-wrap") : null;
  }

  function consultaMostrarTabelaResultados() {
    var tw = consultaTabelaResultadosWrap();
    if (tw) tw.style.display = "";
  }

  function consultaOcultarTabelaResultados() {
    var tw = consultaTabelaResultadosWrap();
    if (tw) tw.style.display = "none";
  }

  function wireEvents() {
    document.getElementById("btnLimparFiltros").addEventListener("click", () => {
      document.getElementById("searchForm").reset();
      renderMessage("");
      clearTable();
      document.getElementById("resultsMeta").textContent = "";
      document.getElementById("paginationBar").style.display = "none";
      currentPage = 1;
      totalRecords = 0;
      lastQuery = null;
      document.getElementById("btnExportarCsv").disabled = true;
      setConsultaResultadosBlockVisivel(false);
      currentSort = ordenacaoPadraoConsulta();
    });

    document.getElementById("btnExportarCsv").addEventListener("click", exportarCsv);

    document.getElementById("searchForm").addEventListener("submit", (e) => {
      e.preventDefault();
      currentPage = 1;
      pesquisar();
    });

    document.getElementById("btnPaginaAnterior").addEventListener("click", () => {
      if (currentPage <= 1) return;
      currentPage--;
      pesquisar();
    });

    document.getElementById("btnPaginaProxima").addEventListener("click", () => {
      var totalPages = Math.max(1, Math.ceil(totalRecords / PAGE_SIZE));
      if (currentPage >= totalPages) return;
      currentPage++;
      pesquisar();
    });

  }

  /** Chaves padrão do servidor (RepositorioPlanilha.obterColunasPadrao_). */
  var CHAVES_COLUNAS_LINK = {
    LinkFSA: true,
    QRInscricao: true,
    LinkInscricao: true,
    QRFrequencia: true,
    Frequencia: true,
    CodVerificacao: true,
    QRAvaliacao: true,
    AvaliacaoReacao: true,
    LinkPagina: true
  };

  function normalizarTextoComparacaoLink(s) {
    return String(s || "")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  /**
   * Títulos literais das colunas URL quando a planilha usa cabeçalho (key === label).
   * Alinhado a RepositorioPlanilha.obterColunasPadrao_ e Index/IndexFragment.
   */
  var ROTULOS_COLUNA_LINK = [
    "Link FSA",
    "Link Inscrição",
    "Link Página",
    "QR Code Inscrição",
    "QR Code Frequência",
    "Frequência",
    "Cód. Verificação",
    "QR Code Avaliação",
    "Avaliação Reação"
  ];
  var ROTULOS_LINK_NORMALIZADOS = {};
  ROTULOS_COLUNA_LINK.forEach(function(lab) {
    ROTULOS_LINK_NORMALIZADOS[normalizarTextoComparacaoLink(lab)] = true;
  });

  function colunaConsultaDeveRenderizarComoLink(col) {
    if (!col) return false;
    var k = String(col.key || "").trim();
    if (CHAVES_COLUNAS_LINK[k]) return true;
    var label = String(col.label || "").trim();
    if (!label) return false;
    if (k && k !== label) return false;
    return !!ROTULOS_LINK_NORMALIZADOS[normalizarTextoComparacaoLink(label)];
  }

  function normalizarHrefHttpSeguro(s) {
    var t = String(s || "").trim();
    if (!t) return null;
    try {
      var u = new URL(t);
      if (u.protocol !== "http:" && u.protocol !== "https:") return null;
      return u.href;
    } catch (_) {
      return null;
    }
  }

  function preencherCelulaConsulta(td, col, v) {
    var text = (v === null || v === undefined) ? "" : String(v);
    var href = colunaConsultaDeveRenderizarComoLink(col) ? normalizarHrefHttpSeguro(text) : null;
    if (href) {
      td.classList.add("consulta-td-link");
      var a = document.createElement("a");
      a.href = href;
      a.textContent = text;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.addEventListener("click", function(e) {
        e.stopPropagation();
      });
      td.appendChild(a);
      td.title = text;
    } else {
      td.textContent = text;
      td.title = text;
    }
  }

  function loadFilterOptions() {
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
    google.script.run
      .withSuccessHandler((config) => {
        if (endBusy) endBusy();
        fillSelect("fCurso", config.CURSOS);
        fillSelect("fTurma", config.TURMAS);
        fillSelect("fStatus", config.STATUS);
        fillSelect("fResponsavel", config.RESPONSAVEIS);
        fillSelect("fOferta", config.OFERTAS);
      })
      .withFailureHandler((err) => {
        if (endBusy) endBusy();
        renderMessage(`Erro ao carregar filtros: ${err}`, "danger");
      })
      .obterConfiguracaoFormulario();
  }

  function fillSelect(id, items) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    el.appendChild(new Option("Todos", ""));
    (items || []).forEach((item) => el.appendChild(new Option(item, item)));
  }

  function getFilters() {
    return {
      curso: document.getElementById("fCurso").value || "",
      turma: document.getElementById("fTurma").value || "",
      status: document.getElementById("fStatus").value || "",
      responsavel: document.getElementById("fResponsavel").value || "",
      oferta: document.getElementById("fOferta").value || "",
      inicioDe: document.getElementById("fInicioDe").value || "",
      inicioAte: document.getElementById("fInicioAte").value || ""
    };
  }

  function pesquisar() {
    var filtros = getFilters();
    var offset = (currentPage - 1) * PAGE_SIZE;
    lastQuery = { filtros: filtros, sort: currentSort, page: { offset: offset, limit: PAGE_SIZE } };

    setSearching(true);
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;

    google.script.run
      .withSuccessHandler(function(resp) {
        if (endBusy) endBusy();
        setSearching(false);
        if (!resp || !resp.columns) {
          setConsultaResultadosBlockVisivel(false);
          clearTable();
          renderMessage("Resposta inválida do servidor.", "danger");
          return;
        }
        renderMessage("");
        totalRecords = resp.total || 0;
        setConsultaResultadosBlockVisivel(totalRecords > 0);
        renderResults(resp);
        updatePaginationUI(resp);
      })
      .withFailureHandler(function(err) {
        if (endBusy) endBusy();
        setSearching(false);
        totalRecords = 0;
        setConsultaResultadosBlockVisivel(false);
        clearTable();
        renderMessage("Erro na pesquisa: " + err, "danger");
      })
      .pesquisarRegistros(lastQuery.filtros, lastQuery.sort, lastQuery.page);
  }

  function updatePaginationUI(resp) {
    var total = resp.total || 0;
    var rows = resp.rows || [];
    var bar = document.getElementById("paginationBar");
    var meta = document.getElementById("resultsMeta");
    var label = document.getElementById("paginationLabel");
    var btnPrev = document.getElementById("btnPaginaAnterior");
    var btnNext = document.getElementById("btnPaginaProxima");

    document.getElementById("btnExportarCsv").disabled = total === 0;

    if (total === 0 && rows.length === 0) {
      bar.style.display = "none";
      meta.textContent = "";
      return;
    }

    bar.style.display = "flex";
    var from = (currentPage - 1) * PAGE_SIZE + 1;
    var to = (currentPage - 1) * PAGE_SIZE + rows.length;
    meta.textContent = "Registros " + from + " a " + to + " de " + total;

    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    label.textContent = "Página " + currentPage + " de " + totalPages;

    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }

  function setSearching(isSearching) {
    const btn = document.getElementById("btnPesquisar");
    btn.setAttribute("aria-busy", isSearching ? "true" : "false");
  }

  function renderMessage(text, type) {
    const el = document.getElementById("msg");
    if (!text) {
      el.innerHTML = "";
      return;
    }
    const cls = type === "danger" ? "is-danger"
      : type === "info" ? "is-info"
      : "is-success";
    el.innerHTML = `<div class="notification ${cls} is-light">${escapeHtml(text)}</div>`;
    if (typeof window.rolarParaVerMensagemNoTopo === "function") {
      window.rolarParaVerMensagemNoTopo(el);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeCsvCell(val) {
    var s = (val === null || val === undefined) ? "" : String(val);
    if (/[",\r\n]/.test(s)) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function exportarCsv() {
    if (!lastQuery || totalRecords === 0) return;
    var btn = document.getElementById("btnExportarCsv");
    btn.disabled = true;
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: true }) : null;
    google.script.run
      .withSuccessHandler(function(data) {
        if (endBusy) endBusy();
        btn.disabled = totalRecords === 0;
        renderMessage("");
        if (!data || !data.columns) {
          renderMessage("Nenhum dado para exportar.", "danger");
          return;
        }
        var columns = data.columns || [];
        var rows = data.rows || [];
        var BOM = "\uFEFF";
        var header = columns.map(function(c) { return escapeCsvCell(c.label || c.key); }).join(";");
        var body = rows.map(function(row) {
          return row.map(function(cell) { return escapeCsvCell(cell); }).join(";");
        }).join("\r\n");
        var csv = BOM + header + "\r\n" + body;
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        var now = new Date();
        var ds = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
        var ts = String(now.getHours()).padStart(2, "0") + "-" + String(now.getMinutes()).padStart(2, "0");
        a.download = "exportacao_" + ds + "_" + ts + ".csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      })
      .withFailureHandler(function(err) {
        if (endBusy) endBusy();
        btn.disabled = false;
        renderMessage("Erro ao exportar: " + err, "danger");
      })
      .obterRegistrosParaExportar(lastQuery.filtros, lastQuery.sort);
  }

  function clearTable() {
    document.getElementById("resultsHead").innerHTML = "";
    document.getElementById("resultsBody").innerHTML = "";
    consultaMostrarTabelaResultados();
  }

  function renderResults(resp) {
    const columns = resp.columns || [];
    const rows = resp.rows || [];
    const total = resp.total || 0;

    if (total === 0) {
      document.getElementById("resultsHead").innerHTML = "";
      document.getElementById("resultsBody").innerHTML = "";
      consultaOcultarTabelaResultados();
      renderMessage(MSG_CONSULTA_SEM_RESULTADO_FILTROS, "info");
      return;
    }

    consultaMostrarTabelaResultados();
    renderHeader(columns);
    renderBody(columns, rows);
  }

  function renderHeader(columns) {
    const thead = document.getElementById("resultsHead");
    thead.innerHTML = "";
    const tr = document.createElement("tr");

    columns.forEach((col) => {
      const th = document.createElement("th");
      th.classList.add("sortable");
      th.textContent = col.label || col.key;

      const icon = document.createElement("span");
      icon.className = "sort-icon";
      icon.textContent = getSortIcon(col.key);
      th.appendChild(icon);

      th.addEventListener("click", () => toggleSort(col.key));
      tr.appendChild(th);
    });

    thead.appendChild(tr);
  }

  function getSortIcon(key) {
    if (currentSort.keys && currentSort.keys.length) {
      const spec = currentSort.keys.find((k) => k.key === key);
      if (!spec) return "⇅";
      return spec.dir === "desc" ? "▼" : "▲";
    }
    if (!currentSort || currentSort.key !== key) return "⇅";
    return currentSort.dir === "asc" ? "▲" : "▼";
  }

  function toggleSort(key) {
    if (currentSort.keys && currentSort.keys.length) {
      currentSort = { key: key, dir: "asc" };
    } else if (currentSort.key === key) {
      currentSort = { key, dir: currentSort.dir === "asc" ? "desc" : "asc" };
    } else {
      currentSort = { key, dir: "asc" };
    }
    currentPage = 1;
    if (lastQuery) pesquisar();
  }

  function renderBody(columns, rows) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    if (!rows.length) {
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = Math.max(1, columns.length);
      td.className = "has-text-centered muted";
      td.style.padding = "18px";
      td.textContent = "Nenhum registro encontrado.";
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    rows.forEach((row) => {
      const tr = document.createElement("tr");
      columns.forEach((col, idx) => {
        const td = document.createElement("td");
        const v = row[idx];
        preencherCelulaConsulta(td, col, v);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  wireEvents();
  loadFilterOptions();
};
</script>
