<!DOCTYPE html>
<html>

    <?!= HtmlService.createHtmlOutputFromFile('LayoutGlobal').getContent(); ?>
    <style>
      .form-content { padding: 40px; }
      .content-block { box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

      .title.is-4 { 
        font-size: 1.75rem; 
        color: #2d4a46; 
        font-weight: 600; 
      }
      
      .label { 
        font-size: 0.95rem; 
        color: #334441; 
        font-weight: 600; 
        margin-bottom: 0.4rem; 
      }

      .section-title { 
        border-left: 6px solid #00bfa5;
        padding: 10px 15px;
        margin: 35px 0 20px 0; 
        color: #1b3330;
        font-weight: 700;
        letter-spacing: 0.5px;
        background: rgba(0, 191, 165, 0.07);
        font-size: 1.1rem;
      }

      .input, .select select { 
        font-size: 0.95rem !important; 
        height: 2.7em;
        border-color: #b0c9c5;
        color: #2d3e3b; /* Cor normal para os valores selecionados */
        font-weight: 500;
      }

      /* Estilo apenas para o estado inicial (vazio) */
      .is-placeholder {
        color: #a0b1af !important;
        font-weight: 400 !important;
      }

      /* Garante que as opções DENTRO do select sejam sempre escuras */
      .select select option {
        color: #2d3e3b;
        font-weight: 500;
      }

      /* Placeholder de data discreto */
      input[type="date"].is-placeholder::-webkit-datetime-edit {
        color: #a0b1af;
      }

      .input:focus, .select select:focus {
        border-color: #00bfa5;
        box-shadow: 0 0 0 0.125em rgba(0, 191, 165, 0.2);
      }

      .buttons-row {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 50px;
        padding-top: 25px;
        border-top: 1px solid #eee;
      }

      .btn-custom {
        background-color: #00bfa5;
        color: #ffffff;
        border: none;
        padding: 0 35px;
        font-weight: 600;
        font-size: 1rem;
        height: 2.8em;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.3s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        text-decoration: none;
      }
      
      .btn-custom:hover { opacity: 0.9; color: #ffffff; text-decoration: none; }
      .btn-custom:disabled { opacity: 0.6; cursor: not-allowed; }

      /* Formulário bloqueado após salvar (edição): campos somente leitura, texto mais claro */
      .formulario-bloqueado .input,
      .formulario-bloqueado .select select {
        background-color: #f5f9f8 !important;
        color: #7a8d89 !important;
        cursor: not-allowed;
      }
      .formulario-bloqueado input[readonly],
      .formulario-bloqueado select:disabled {
        pointer-events: none;
      }
      .actions-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 15px;
      }
      .pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        background: rgba(0,191,165,0.1);
        color: #1b3330;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .muted { color: #6b8b86; }
    </style>
  </head>

    <script>
      function updateStyle(el) {
        if (el.value && el.value !== "") {
          el.classList.remove('is-placeholder');
        } else {
          el.classList.add('is-placeholder');
        }
      }
    </script>
