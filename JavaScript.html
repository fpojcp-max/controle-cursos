<script>
  const CAMPOS_FORM = [
    "curso", "turma", "inicio", "fim", "sala", "oferta", "responsavel", "prioridade",
    "fimInscricoes", "status", "linkFSA", "tr", "termo", "plataformas", "coffee",
    "agendarSala", "qrInscricao", "linkInscricao", "qrFrequencia", "frequencia",
    "codVerificacao", "qrAvaliacao", "avaliacaoReacao", "prepDivulgacao", "divulgacao", "linkPagina"
  ];

  window.CadastroInit = function() {
    var endCfg = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
    google.script.run
      .withSuccessHandler(function(config) {
        if (endCfg) endCfg();
        popularCampos(config);
        inicializarEdicaoSeNecessario();
      })
      .withFailureHandler(function(err) {
        if (endCfg) endCfg();
        var msg = document.getElementById("msg");
        if (msg) {
          msg.innerHTML = "<div class=\"notification is-danger is-light has-text-right\">Erro ao carregar opções: " + String(err).replace(/</g, "&lt;") + "</div>";
          if (typeof window.rolarParaVerMensagemNoTopo === "function") {
            window.rolarParaVerMensagemNoTopo(msg);
          }
        }
      })
      .obterConfiguracaoFormulario();
  };

  function inicializarEdicaoSeNecessario() {
    const elId = document.getElementById("registroId");
    const id = (elId && elId.value ? elId.value : "").trim();
    if (!id) return;
    const form = document.getElementById("ticketForm");
    if (form.classList.contains("formulario-bloqueado")) return;
    document.getElementById("btnEnviar").textContent = "Salvar";
    document.getElementById("btnLimpar").disabled = true;
    var endLoad = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
    google.script.run
      .withSuccessHandler(function(dados) {
        if (endLoad) endLoad();
        if (dados) {
          preencherFormularioEdicao(dados);
        } else {
          var msg = document.getElementById("msg");
          if (msg) {
            msg.innerHTML = '<div class="notification is-warning is-light has-text-right">Registro não encontrado.</div>';
            if (typeof window.rolarParaVerMensagemNoTopo === "function") {
              window.rolarParaVerMensagemNoTopo(msg);
            } else {
              scrollParaTopo();
            }
          }
        }
      })
      .withFailureHandler(function(err) {
        if (endLoad) endLoad();
        var msg = document.getElementById("msg");
        if (msg) {
          msg.innerHTML = '<div class="notification is-danger is-light has-text-right">Erro ao carregar registro: ' + (err && err.message ? err.message : String(err)) + '</div>';
          if (typeof window.rolarParaVerMensagemNoTopo === "function") {
            window.rolarParaVerMensagemNoTopo(msg);
          } else {
            scrollParaTopo();
          }
        }
      })
      .obterRegistroPorId(id);
  }

  function preencherFormularioEdicao(dados) {
    CAMPOS_FORM.forEach(function(key) {
      const el = document.getElementById(key);
      if (!el) return;
      const v = dados[key];
      el.value = (v === null || v === undefined) ? "" : String(v).trim();
      el.classList.remove("is-placeholder");
      if (el.tagName === "SELECT" && el.options.length) {
        try {
          if (el.value) el.classList.remove("is-placeholder");
        } catch (_) {}
      }
    });
  }

  function popularCampos(config) {
    const idsMapeados = {
      'curso': config.CURSOS, 'turma': config.TURMAS, 'sala': config.SALAS,
      'oferta': config.OFERTAS, 'responsavel': config.RESPONSAVEIS,
      'prioridade': config.PRIORIDADES, 'status': config.STATUS,
      'tr': config.BOOLEANOS, 'termo': config.BOOLEANOS, 'plataformas': config.BOOLEANOS,
      'coffee': config.BOOLEANOS, 'agendarSala': config.BOOLEANOS,
      'prepDivulgacao': config.BOOLEANOS, 'divulgacao': config.BOOLEANOS
    };

    for (let id in idsMapeados) {
      const el = document.getElementById(id);
      if (!el) continue;
      
      el.innerHTML = ''; 
      el.classList.add('is-placeholder');
      
      const placeholder = new Option("selecione", "");
      placeholder.disabled = true;
      placeholder.selected = true;
      el.options.add(placeholder);

      idsMapeados[id].forEach(item => {
        el.options.add(new Option(item, item));
      });
    }
  }

  function resetVisualStyles() {
    const fields = document.querySelectorAll('select, input[type="date"]');
    fields.forEach(f => f.classList.add('is-placeholder'));
  }

  document.getElementById('btnLimpar').onclick = function() {
    if (document.getElementById("ticketForm").classList.contains("formulario-bloqueado")) return;
    if(confirm("Deseja limpar todos os dados do formulário?")) {
      document.getElementById('ticketForm').reset();
      document.getElementById('registroId').value = '';
      document.getElementById('msg').innerHTML = '';
      resetVisualStyles();
      var endLimpar = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
      google.script.run
        .withSuccessHandler(function(c) {
          if (endLimpar) endLimpar();
          popularCampos(c);
        })
        .withFailureHandler(function() {
          if (endLimpar) endLimpar();
        })
        .obterConfiguracaoFormulario();
      document.getElementById('btnEnviar').textContent = 'Salvar';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  function coletarDadosFormulario() {
    const o = {};
    CAMPOS_FORM.forEach(function(key) {
      const el = document.getElementById(key);
      o[key] = el ? el.value : "";
    });
    return o;
  }

  function scrollParaTopo() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /** Evita depender de firstChild após innerHTML (robusto em SPA / parsing do DOM). */
  function notificarNoElementoMsg(el, texto, tipo) {
    if (!el) return;
    el.innerHTML = "";
    var div = document.createElement("div");
    div.className =
      tipo === "danger"
        ? "notification is-danger is-light has-text-right"
        : "notification is-success is-light has-text-left";
    div.textContent = texto != null ? String(texto) : "";
    el.appendChild(div);
  }

  function bloquearFormularioAposEdicao() {
    const form = document.getElementById("ticketForm");
    form.classList.add("formulario-bloqueado");
    CAMPOS_FORM.forEach(function(key) {
      const el = document.getElementById(key);
      if (!el) return;
      if (el.tagName === "SELECT") el.disabled = true;
      else el.readOnly = true;
    });
    document.getElementById("btnEnviar").disabled = true;
    document.getElementById("btnLimpar").disabled = true;
  }

  document.getElementById('ticketForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnEnviar');
    const msg = document.getElementById('msg');
    const registroId = (document.getElementById('registroId').value || '').trim();
    
    btn.disabled = true;
    btn.setAttribute("aria-busy", "true");

    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: true }) : null;

    const dados = coletarDadosFormulario();

    function sucessoCadastro(resp) {
      notificarNoElementoMsg(msg, resp || "", "success");
      btn.textContent = "Salvar";
      btn.disabled = false;
      btn.setAttribute("aria-busy", "false");
      document.getElementById('ticketForm').reset();
      document.getElementById('registroId').value = '';
      resetVisualStyles();
      if (typeof window.rolarParaVerMensagemNoTopo === "function") {
        window.rolarParaVerMensagemNoTopo(msg);
      } else {
        scrollParaTopo();
      }
      google.script.run.withSuccessHandler(c => popularCampos(c)).obterConfiguracaoFormulario();
    }

    function sucessoEdicao(resp) {
      notificarNoElementoMsg(msg, resp || "", "success");
      btn.textContent = "Salvar";
      btn.disabled = false;
      btn.setAttribute("aria-busy", "false");
      bloquearFormularioAposEdicao();
      if (typeof window.rolarParaVerMensagemNoTopo === "function") {
        window.rolarParaVerMensagemNoTopo(msg);
      } else {
        scrollParaTopo();
      }
    }

    function falhaMsg(err) {
      notificarNoElementoMsg(msg, "Erro: " + (err != null ? String(err) : ""), "danger");
      btn.textContent = "Salvar";
      btn.disabled = false;
      btn.setAttribute("aria-busy", "false");
      if (typeof window.rolarParaVerMensagemNoTopo === "function") {
        window.rolarParaVerMensagemNoTopo(msg);
      } else {
        scrollParaTopo();
      }
    }

    function onResult(resp) {
      if (endBusy) endBusy();
      if (!resp || resp.success === false) {
        falhaMsg(resp ? resp.message : "Erro desconhecido.");
        return;
      }
      if (registroId) sucessoEdicao(resp.message);
      else sucessoCadastro(resp.message);
    }

    if (registroId) {
      google.script.run
        .withSuccessHandler(onResult)
        .withFailureHandler(function(err) {
          if (endBusy) endBusy();
          falhaMsg(err);
        })
        .atualizarRegistro(registroId, dados);
    } else {
      google.script.run
        .withSuccessHandler(onResult)
        .withFailureHandler(function(err) {
          if (endBusy) endBusy();
          falhaMsg(err);
        })
        .salvarRegistro(dados);
    }
  };
</script>
