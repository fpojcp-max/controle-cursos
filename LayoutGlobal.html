<style>
  :root {
    --brand: #00bfa5;
    --ink: #1b3330;
    --muted: #6b8b86;
    --card: rgba(255, 255, 255, 0.98);
    --surface: #f8fcfb;
    --border: #dde5e3;
    --shadow: 0 15px 35px rgba(0,0,0,0.10);
    --shadow-soft: 0 10px 24px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  body {
    background: linear-gradient(135deg, #e0f2f1 0%, #f1f8e9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  /* Layout shell: 3 áreas físicas (header / main / footer) */
  .form-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: transparent;
  }

  .layout-block {
    background-color: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .header-banner {
    background-color: var(--surface);
    padding: 18px 26px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: nowrap;
  }

  .logo-img {
    max-height: 70px;
    width: auto;
  }

  .header-left-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .header-left-text small {
    font-weight: 600;
    color: #2d4a46;
  }

  .header-title {
    margin-left: auto;
    text-align: right;
  }

  .header-title .title.is-4 {
    font-size: 1.75rem;
    color: #2d4a46;
    font-weight: 600;
    margin-bottom: 0;
  }

  .footer-banner {
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* Responsividade: título quebra e alinha bem */
  @media (max-width: 820px) {
    .header-inner { flex-wrap: wrap; }
    .header-title { margin-left: 0; width: 100%; text-align: left; }
    .logo-img { max-height: 58px; }
  }
</style>
