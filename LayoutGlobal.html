<style>
  :root {
    --brand: #00bfa5;
    --ink: #1b3330;
    --muted: #6b8b86;
    --card: rgba(255, 255, 255, 0.98);
    --surface: #f8fcfb;
    --border: #dde5e3;
    --border-strong: #a8bab6;
    --shadow: 0 15px 35px rgba(0,0,0,0.10);
    --shadow-soft: 0 10px 24px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  body {
    background: linear-gradient(135deg, #e0f2f1 0%, #f1f8e9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  body > .form-container { align-self: stretch; }

  /* Layout shell: 3 áreas físicas (header / main / footer); main cresce para rodapé ficar no pé da tela; conteúdo centralizado */
  .form-container {
    width: 100%;
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: transparent;
    flex: 1;
    min-height: 0;
    box-sizing: border-box;
  }

  .form-container > main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: visible;
  }

  .layout-block {
    background-color: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .header-banner {
    background-color: var(--surface);
    padding: 18px 26px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: nowrap;
  }

  .logo-home-link {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
    border-radius: 4px;
    color: inherit;
  }
  .logo-home-link:focus-visible {
    outline: 2px solid var(--brand);
    outline-offset: 3px;
  }

  .logo-img {
    max-height: 70px;
    width: auto;
  }

  .header-left-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .header-left-text small {
    font-weight: 600;
    color: #2d4a46;
  }

  .header-title {
    margin-left: auto;
    text-align: right;
  }

  .header-title .title.is-4 {
    font-size: 1.75rem;
    color: #2d4a46;
    font-weight: 600;
    margin-bottom: 0;
  }

  .footer-banner {
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 600;
    border: 1px solid var(--border-strong);
  }

  /* Menu principal: barra um pouco menor; fundo mais destacado; subitens em retângulo flutuante */
  .app-menu {
    background: #e8f2f1;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 0;
    overflow: visible;
  }
  .app-menu-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 0; align-items: stretch; }
  .app-menu-item {
    margin: 0;
    padding: 0;
    border-right: 1px solid var(--border);
  }
  .app-menu-item:last-child { border-right: none; }
  .app-menu-item-dropdown { position: relative; }
  .app-menu-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 9px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #000;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    text-decoration: none;
    font-family: inherit;
    transition: background 0.2s, font-weight 0.15s ease;
    width: 100%;
    box-sizing: border-box;
  }
  .app-menu-item:not(.app-menu-item-disabled) .app-menu-trigger:hover { background: rgba(0, 191, 165, 0.12); color: #000; }
  .app-menu-item-dropdown.is-active > .app-menu-trigger {
    color: #000;
    font-weight: 800;
    border-bottom: 2px solid var(--brand);
    margin-bottom: -2px;
  }
  .app-menu-chevron {
    display: inline-block;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid currentColor;
    margin-left: 2px;
    transition: transform 0.2s;
  }
  .app-menu-item-dropdown.is-open .app-menu-chevron { transform: rotate(180deg); }
  /* Submenu: retângulo flutuante, solto da barra */
  .app-menu-sub {
    list-style: none;
    margin: 0;
    padding: 0;
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 5px;
    min-width: 168px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 50;
  }
  .app-menu-item-dropdown.is-open .app-menu-sub { display: block; }
  .app-menu-sub li { margin: 0; }
  .app-menu-link {
    display: block;
    padding: 8px 14px;
    font-size: 0.9rem;
    font-weight: 600;
    color: #000;
    text-decoration: none;
    transition: background 0.2s, font-weight 0.15s ease;
    border-bottom: 1px solid var(--border);
  }
  .app-menu-sub li:last-child .app-menu-link { border-bottom: none; }
  .app-menu-link:hover { background: rgba(0, 191, 165, 0.1); color: #000; }
  .app-menu-link.is-active {
    color: #000;
    font-weight: 800;
    background: rgba(0, 0, 0, 0.04);
    box-shadow: inset 3px 0 0 var(--brand);
  }
  .app-menu-item-disabled .app-menu-trigger { color: var(--muted); cursor: not-allowed; opacity: 0.7; }
  .app-menu-item-disabled .app-menu-chevron { display: none; }

  /* Responsividade: título quebra e alinha bem */
  @media (max-width: 820px) {
    .header-inner { flex-wrap: wrap; }
    .header-title { margin-left: 0; width: 100%; text-align: left; }
    .logo-img { max-height: 58px; }
  }
</style>
