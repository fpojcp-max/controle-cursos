<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <?!= HtmlService.createHtmlOutputFromFile('LayoutGlobal').getContent(); ?>
    <?!= HtmlService.createHtmlOutputFromFile('ShellViewStyles').getContent(); ?>
  </head>
  <body data-initial-view="<?= initialView ?>" data-initial-id="<?= initialId ? String(initialId).replace(/&/g,'&amp;').replace(/"/g,'&quot;') : '' ?>">
    <?!= HtmlService.createHtmlOutputFromFile('AppOcupado').getContent(); ?>
    <div class="form-container">
      <?!= HtmlService.createHtmlOutputFromFile('Header').getContent(); ?>

      <main class="layout-block content-block">
        <?!= menuHtml ?>
        <div id="main-content" class="spa-content"></div>
      </main>

      <?!= HtmlService.createHtmlOutputFromFile('Footer').getContent(); ?>
    </div>

    <script>
  /** Disponível em todas as views: rola a janela para o topo e leva a área da mensagem à vista. */
  window.rolarParaVerMensagemNoTopo = function(optAnchor) {
    setTimeout(function() {
      var anchor =
        optAnchor ||
        document.getElementById("msgAgendamento") ||
        document.getElementById("msgAgEx") ||
        document.getElementById("msgAgEd") ||
        document.getElementById("msgAgCo") ||
        document.getElementById("msgTuEd") ||
        document.getElementById("msg");
      if (anchor && anchor.scrollIntoView) {
        try {
          anchor.scrollIntoView({ behavior: "smooth", block: "start" });
        } catch (e4) {
          try {
            anchor.scrollIntoView(true);
          } catch (e5) {}
        }
        return;
      }
      try {
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (e6) {
        try {
          window.scrollTo(0, 0);
        } catch (e7) {}
      }
    }, 0);
  };
    </script>
    <script>
(function() {
  var mainContent = document.getElementById("main-content");
  if (!mainContent) return;

  function runScript(scriptText) {
    if (!scriptText || !scriptText.trim()) return;
    var code = scriptText.replace(/<script[^>]*>([\s\S]*?)<\/script>/gi, "$1").trim();
    if (!code) return;
    var el = document.createElement("script");
    el.textContent = code;
    document.body.appendChild(el);
    document.body.removeChild(el);
  }

  function closeMenuDropdowns() {
    var menu = document.querySelector(".app-menu");
    if (!menu) return;
    menu.querySelectorAll(".app-menu-item-dropdown.is-open").forEach(function(li) { li.classList.remove("is-open"); });
    menu.querySelectorAll(".app-menu-trigger[aria-expanded]").forEach(function(btn) { btn.setAttribute("aria-expanded", "false"); });
  }

  function setMenuActive(view, resourceId) {
    resourceId = resourceId && String(resourceId).trim() ? String(resourceId).trim() : "";
    var menu = document.querySelector(".app-menu");
    if (!menu) return;
    menu.querySelectorAll(".app-menu-item-dropdown").forEach(function(li) { li.classList.remove("is-active"); });
    menu.querySelectorAll(".app-menu-link").forEach(function(a) { a.classList.remove("is-active"); });
    menu.querySelectorAll(".app-menu-link-spa").forEach(function(a) { a.classList.remove("is-active"); });
    var group = null;
    if (view === "consulta" || view === "cadastro" || view === "turma-editar" || view === "turma-excluir") group = "turma";
    else if (
      view === "agendamento-incluir" ||
      view === "agendamento-consulta" ||
      view === "agendamento-editar" ||
      view === "agendamento-excluir"
    )
      group = "agendamento";
    if (group) {
      var dd = menu.querySelector('.app-menu-item-dropdown[data-dropdown="' + group + '"]');
      if (dd) dd.classList.add("is-active");
    }
    var link = null;
    if (view === "cadastro" && resourceId) {
      link = menu.querySelector('.app-menu-link-spa[data-view="consulta"]');
    } else if (view === "cadastro") {
      link = menu.querySelector('.app-menu-link-spa[data-view="cadastro"]');
    } else {
      link = menu.querySelector('.app-menu-link[data-view="' + view + '"]');
      if (!link) link = menu.querySelector('.app-menu-link-spa[data-view="' + view + '"]');
    }
    if (link) link.classList.add("is-active");
  }

  function showError(msg) {
    mainContent.innerHTML = "<div class=\"main-placeholder\" style=\"display:flex;align-items:center;justify-content:center;color:#b71c1c;padding:24px;\">" + String(msg).replace(/</g, "&lt;") + "</div>";
    if (typeof window.rolarParaVerMensagemNoTopo === "function") {
      window.rolarParaVerMensagemNoTopo(mainContent);
    }
  }

  function navigate(view, id) {
    view = view || "home";
    id = (id && String(id).trim()) ? String(id).trim() : "";
    mainContent.innerHTML = "<div class=\"main-placeholder\"></div>";
    var MS_POR_TENTATIVA = 55000;
    var MAX_TENTATIVAS = 2;
    var endBusy = typeof window.appOcupadoIniciar === "function" ? window.appOcupadoIniciar({ blocking: false }) : null;
    var busySafetyTimer = null;
    var tentativaCarregar = 1;

    function limparTimerNavegacao() {
      if (busySafetyTimer) {
        clearTimeout(busySafetyTimer);
        busySafetyTimer = null;
      }
    }

    function encerrarOcupadoNavegacao() {
      limparTimerNavegacao();
      if (endBusy) {
        endBusy();
        endBusy = null;
      }
    }

    function falhaFinalNavegacao(mensagem) {
      encerrarOcupadoNavegacao();
      showError(mensagem);
    }

    function armarTimeoutPedido() {
      limparTimerNavegacao();
      busySafetyTimer = setTimeout(function() {
        busySafetyTimer = null;
        if (tentativaCarregar >= MAX_TENTATIVAS) {
          falhaFinalNavegacao(
            "A resposta do servidor não chegou ao browser a tempo (não está relacionado com o tamanho da planilha). " +
              "Já foi feita uma nova tentativa automática. Atualize a página (F5) ou tente outro browser/rede."
          );
          return;
        }
        tentativaCarregar++;
        pedirPagina();
      }, MS_POR_TENTATIVA);
    }

    function pedirPagina() {
      armarTimeoutPedido();
      google.script.run
        .withSuccessHandler(function(data) {
          limparTimerNavegacao();
          if (endBusy) {
            endBusy();
            endBusy = null;
          }
          try {
            if (!data || typeof data.html === "undefined") {
              mainContent.innerHTML = "<div class=\"main-placeholder\"></div>";
              return;
            }
            var html = data.html;
            if (typeof html !== "string" || !html.trim()) {
              showError("Resposta vazia do servidor.");
              return;
            }
            mainContent.innerHTML = html;
            if (data.script && data.script.trim()) runScript(data.script);
            if (view === "consulta" && typeof window.ConsultaInit === "function") {
              try { window.ConsultaInit(); } catch (err) { showError("Erro ao iniciar Consultar (turmas): " + (err && err.message ? err.message : String(err))); }
            } else if (view === "cadastro" && typeof window.CadastroInit === "function") {
              try { window.CadastroInit(); } catch (err) { showError("Erro ao iniciar Cadastro: " + (err && err.message ? err.message : String(err))); }
            } else if (view === "agendamento-incluir" && typeof window.AgendamentoIncluirInit === "function") {
              try { window.AgendamentoIncluirInit(); } catch (err) { showError("Erro ao iniciar Agendamento: " + (err && err.message ? err.message : String(err))); }
            } else if (view === "agendamento-consulta" && typeof window.AgendamentoConsultaInit === "function") {
              try { window.AgendamentoConsultaInit(); } catch (err) { showError("Erro ao iniciar Consultar (agendamentos): " + (err && err.message ? err.message : String(err))); }
            } else if (view === "agendamento-editar" && typeof window.AgendamentoEditarInit === "function") {
              try { window.AgendamentoEditarInit(); } catch (err) { showError("Erro ao iniciar Edição de agendamentos: " + (err && err.message ? err.message : String(err))); }
            } else if (view === "agendamento-excluir" && typeof window.AgendamentoExcluirInit === "function") {
              try { window.AgendamentoExcluirInit(); } catch (err) { showError("Erro ao iniciar Exclusão de agendamentos: " + (err && err.message ? err.message : String(err))); }
            } else if (view === "turma-excluir" && typeof window.TurmaExcluirInit === "function") {
              try { window.TurmaExcluirInit(); } catch (err) { showError("Erro ao iniciar Exclusão de turmas: " + (err && err.message ? err.message : String(err))); }
            } else if (view === "turma-editar" && typeof window.TurmaEditarInit === "function") {
              try { window.TurmaEditarInit(); } catch (err) { showError("Erro ao iniciar Edição de turmas: " + (err && err.message ? err.message : String(err))); }
            }
          } catch (err) {
            showError("Erro ao aplicar conteúdo: " + (err && err.message ? err.message : String(err)));
          }
        })
        .withFailureHandler(function(err) {
          limparTimerNavegacao();
          if (tentativaCarregar >= MAX_TENTATIVAS) {
            if (endBusy) {
              endBusy();
              endBusy = null;
            }
            showError("Erro ao carregar: " + String(err));
            return;
          }
          tentativaCarregar++;
          pedirPagina();
        })
        .getPageContent(view, id);
    }

    setMenuActive(view, id);
    pedirPagina();
  }

  window.navigate = navigate;

  document.body.addEventListener("click", function(e) {
    var el = e.target.closest("[data-view]");
    if (el && el.getAttribute("data-view")) {
      e.preventDefault();
      e.stopPropagation();
      closeMenuDropdowns();
      navigate(el.getAttribute("data-view"), el.getAttribute("data-id") || "");
      return false;
    }
  }, true);

  document.body.addEventListener("keydown", function(e) {
    if (e.key !== "Enter" && e.key !== " ") return;
    var el = e.target.closest("[data-view]");
    if (el && el.getAttribute("data-view")) {
      e.preventDefault();
      closeMenuDropdowns();
      navigate(el.getAttribute("data-view"), el.getAttribute("data-id") || "");
    }
  }, true);

  var initialView = document.body.getAttribute("data-initial-view") || "home";
  var initialId = document.body.getAttribute("data-initial-id") || "";
  navigate(initialView, initialId);
})();
    </script>
  </body>
</html>
